<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <title>Beamer Racing - Regisztráció</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="garagePage">
    <!-- Regisztrációs oldal -->
    <!-- Regisztrációs oldal fő kerete -->
    <main id="garageMenu">
        <!-- Regisztrációs panel -->
        <div class="panel authPanel">

            <h2>Regisztráció</h2>

            <div class="settingGroup">
                <h3>Felhasználónév</h3>
                <input type="text" id="usernameInput" maxlength="50">
            </div>

            <div class="settingGroup">
                <h3>Jelszó</h3>
                <input type="password" id="passwordInput">
            </div>

            <button class="menuBtn" id="registerBtn">
                Regisztráció
            </button>

            <button class="menuBtn" id="loginPageBtn">
                Vissza a bejelentkezéshez
            </button>

            <p id="messageBox"></p>
        </div>
        <div id="exitGlow"></div>
        <div id="projectExitZone"></div>
    </main>
    <!-- Regisztráció kezelése -->
    <script>
        const usernameInput = document.getElementById("usernameInput");
        const passwordInput = document.getElementById("passwordInput");
        const registerBtn = document.getElementById("registerBtn");
        const loginPageBtn = document.getElementById("loginPageBtn");
        const messageBox = document.getElementById("messageBox");

        registerBtn.addEventListener("click", () => {

            fetch("backend/register.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username: usernameInput.value.trim(),
                    password: passwordInput.value
                })
            })
                .then(response => response.json())
                .then(data => {
                    messageBox.textContent = data.message;

                    if (data.success) {
                        setTimeout(() => {
                            window.location.href = "login.html";
                        }, 800);
                    }
                });
        });

        loginPageBtn.addEventListener("click", () => {
            window.location.href = "login.html";
        });
        const exitGlow =
            document.getElementById("exitGlow");

        const projectExitZone =
            document.getElementById("projectExitZone");

        exitGlow.style.display = "block";
        projectExitZone.style.display = "block";

        projectExitZone.addEventListener("click", () => {
            window.location.href = "../index.html";
        });
    </script>

</body>

</html>
