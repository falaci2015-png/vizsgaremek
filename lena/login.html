<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <title>Bejelentkezés</title>

    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <!-- Bejelentkezési oldal -->
    <!-- Bejelentkezési panel -->
    <div class="loginContainer">
        <h1>Léna</h1>
        <p class="subtitle">
            The Endless Worlds
        </p>
        <h2>Bejelentkezés</h2>
        <!-- Bejelentkezési űrlap -->
        <form id="loginForm">
            <label>
                Felhasználónév
            </label>
            <input type="text" name="username" required>
            <label>
                Jelszó
            </label>
            <input type="password" name="password" required>
            <button type="submit">
                Belépés
            </button>
        </form>
        <p class="authLinkText">
            Nincs még fiókod?
        </p>
        <a class="authLink" href="register.html">
            Regisztráció
        </a>
        <p></p>
        <!-- Visszalépés a közös főmenübe -->
        <button class="exitBtn" onclick="window.location.href='../index.html'">
            Kilép
        </button>
    </div>
    <!-- Bejelentkezés kezelése -->
    <script>
        document
            .getElementById("loginForm")
            .addEventListener("submit", function (event) {
                event.preventDefault();
                const formData =
                    new FormData(this);
                fetch("backend/login.php", {
                    method: "POST",
                    body: formData
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            window.location.href =
                                "index.html";
                        } else {
                            alert(data.message);
                        }
                    });
            });
    </script>
</body>

</html>
