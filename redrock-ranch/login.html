<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <title>Redrock Ranch - Belépés</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="menuPage">

    <main class="menuContainer">
        <!-- Bejelentkezési panel -->
        <section class="settingsPanel">
            <h1>BELÉPÉS</h1>

            <label class="settingRow">
                <span>Felhasználónév</span>
                <input type="text" id="username">
            </label>

            <label class="settingRow">
                <span>Jelszó</span>
                <input type="password" id="password">
            </label>

            <button id="loginBtn" class="menuBtn">BELÉPÉS</button>
            <button id="registerPageBtn" class="menuBtn">REGISZTRÁCIÓ</button>

            <p id="loginMessage"></p>
        </section>
        <div id="projectExitZone" title="Vissza a gyűjteménybe"></div>

    </main>

    <script src="js/login.js"></script>
</body>

</html>
