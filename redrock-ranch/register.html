<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <title>Redrock Ranch - Regisztráció</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<!-- Regisztrációs panel -->

<body class="menuPage">

    <main class="menuContainer">

        <section class="settingsPanel">
            <h1>REGISZTRÁCIÓ</h1>

            <label class="settingRow">
                <span>Felhasználónév</span>
                <input type="text" id="username">
            </label>

            <label class="settingRow">
                <span>Jelszó</span>
                <input type="password" id="password">
            </label>

            <label class="settingRow">
                <span>Jelszó újra</span>
                <input type="password" id="passwordAgain">
            </label>

            <button id="registerBtn" class="menuBtn">REGISZTRÁCIÓ</button>
            <button id="loginPageBtn" class="menuBtn">VISSZA A BELÉPÉSHEZ</button>

            <p id="registerMessage"></p>
        </section>
        <div id="projectExitZone" title="Vissza a gyűjteménybe"></div>

    </main>

    <script src="js/register.js"></script>
</body>

</html>
